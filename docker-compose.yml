services:
  postgres:
    image: postgres:16-alpine
    container_name: mobileshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mobileshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mobileshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mobileshop-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/mobileshop"
      JWT_SECRET: "your-super-secret-jwt-secret-change-this-in-production"
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    volumes:
      # Mount for development - optional, comment out in production
      # - ./backend/src:/app/src
      # - ./backend/prisma:/app/prisma
      - backend_logs:/app/logs
    networks:
      - mobileshop-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:5000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => { process.exit(1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL to be ready...' &&
        sleep 5 &&
        npx prisma migrate deploy &&
        node dist/server.js
      "

  lotchan-pos-web:
    build:
      context: ./lotchan-pos-web
      dockerfile: Dockerfile
    container_name: mobileshop-pos-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:5000/api"
    ports:
      - "8082:80"
      - "8443:443"  # For future SSL support
    networks:
      - mobileshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  customer-app:
    build:
      context: ./customer-app
      dockerfile: Dockerfile
    container_name: mobileshop-customer-app
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - mobileshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

networks:
  mobileshop-network:
    driver: bridge